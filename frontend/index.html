<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AeroFlight | Book Modern Travel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: url('https://images.unsplash.com/photo-1436491865332-7a61a109cc05?q=80&w=2074') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        .navbar { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">AeroFlight</a>
        <div class="d-flex">
            <button class="btn btn-outline-light me-2">Login</button>
        </div>
    </div>
</nav>

<div class="container mt-5 pt-5 d-flex justify-content-center">
    <div class="col-lg-8 glass-card p-5 mt-5">
        <h2 class="text-white fw-bold mb-4">Where to next?</h2>
        <form id="searchForm">
            <div class="row g-3">
                <div class="col-md-6">
                    <input type="text" id="origin" class="form-control" placeholder="From (e.g. NYC)" required>
                </div>
                <div class="col-md-6">
                    <input type="text" id="destination" class="form-control" placeholder="To (e.g. LAX)" required>
                </div>
                <div class="col-12 mt-4">
                    <button type="submit" class="btn btn-primary px-4 fw-bold w-100">Search Flights</button>
                </div>
            </div>
        </form>
        
        <div id="results" class="mt-4 text-white"></div>
    </div>
</div>

<script src="js/app.js"></script>
</body>

<div class="modal fade" id="loginModal" tabindex="-1" aria-labelledby="loginModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content text-dark">
            <div class="modal-header border-0">
                <h5 class="modal-title fw-bold" id="loginModalLabel">Welcome Back</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body px-5 pb-5">
                <div id="loginAlert" class="alert alert-danger d-none" role="alert"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="loginEmail" class="form-label">Email address</label>
                        <input type="email" class="form-control" id="loginEmail" required>
                    </div>
                    <div class="mb-4">
                        <label for="loginPassword" class="form-label">Password</label>
                        <input type="password" class="form-control" id="loginPassword" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">Login</button>
                </form>
                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="#" class="text-decoration-none">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
</html>
